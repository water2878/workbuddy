        function addMessage(text, isCustomer = false) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isCustomer ? 'customer' : 'service'}`;
            
            const avatar = isCustomer ? '👤' : '👩‍💼';
            const name = isCustomer ? '您' : '<strong>客服小李：</strong>';

                    <div class="time">${getCurrentTime()}</div>

            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function showTyping() {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message service';
            messageDiv.id = 'typingIndicator';
            messageDiv.innerHTML = `

                        </div>
                    </div>

            `;

            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';
            
            setTimeout(() => {
                showTyping();
                
                setTimeout(() => {
                    removeTyping();
                    
                    let response = defaultResponse;
                    for (const key in responses) {
                        if (message.includes(key)) {
                            response = responses[key];
                            break;
                        }
                    }
                    
                    addMessage(response, false);
                }, 1000 + Math.random() * 1000);
            }, 300);
        }

            if (e.key === 'Enter') {
